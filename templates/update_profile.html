{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center mt-4">
    <div class="col-md-5">
        <div class="card" style="border-radius: 16px; overflow: hidden;
                                  box-shadow: 0 8px 32px rgba(123,0,0,0.1);">

            <!-- Card Header -->
            <div class="text-center py-4"
                 style="background: #fff8f8; border-bottom: 2px solid #f0e0e0;">
                <div style="font-size: 2.2rem;">✏️</div>
                <h5 class="fw-bold mb-0 mt-2" style="color: #7b0000;">Update Profile</h5>
                <p class="small mb-0 text-muted">Update your donor information</p>
            </div>

            <div class="card-body p-4">
                {% if error %}
                <div class="alert alert-danger rounded-3 small py-2">{{ error }}</div>
                {% endif %}

                <form method="POST" action="/update-profile/">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label fw-semibold small" style="color: #444;">Blood Group</label>
                        <select name="blood_group" class="form-select" required
                                style="border: 1.5px solid #ddd; border-radius: 10px;
                                       color: #7b0000; font-weight: 600;">
                            <option value="A+"  {% if donor.blood_group == 'A+'  %}selected{% endif %}>A+</option>
                            <option value="A-"  {% if donor.blood_group == 'A-'  %}selected{% endif %}>A-</option>
                            <option value="B+"  {% if donor.blood_group == 'B+'  %}selected{% endif %}>B+</option>
                            <option value="B-"  {% if donor.blood_group == 'B-'  %}selected{% endif %}>B-</option>
                            <option value="O+"  {% if donor.blood_group == 'O+'  %}selected{% endif %}>O+</option>
                            <option value="O-"  {% if donor.blood_group == 'O-'  %}selected{% endif %}>O-</option>
                            <option value="AB+" {% if donor.blood_group == 'AB+' %}selected{% endif %}>AB+</option>
                            <option value="AB-" {% if donor.blood_group == 'AB-' %}selected{% endif %}>AB-</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold small" style="color: #444;">District</label>
                        <input type="text" name="district" class="form-control"
                               value="{{ donor.district }}"
                               list="district-list"
                               placeholder="Type your district..."
                               autocomplete="off" required
                               style="border: 1.5px solid #ddd; border-radius: 10px;">
                        <datalist id="district-list">
                        {% for d in districts %}
                            <option value="{{ d|title }}">
                        {% endfor %}
                        </datalist>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold small" style="color: #444;">Phone Number</label>
                        <input type="tel" name="phone" class="form-control"
                               value="{{ donor.phone }}"
                               placeholder="98XXXXXXXX" required
                               maxlength="10"
                               style="border: 1.5px solid #ddd; border-radius: 10px;">
                    </div>

                    <div class="d-grid mt-4">
                        <button type="submit" class="btn fw-bold py-2"
                                style="background: #7b0000; color: white;
                                       border-radius: 10px; font-size: 15px;">
                            Save Changes →
                        </button>
                    </div>
                </form>

                <div class="text-center mt-3">
                    <a href="/dashboard/" style="color: #7b0000;" class="small">
                        ← Back to Dashboard
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
